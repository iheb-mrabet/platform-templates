apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: fastapi-golden-path
  title: FastAPI Golden Path Service
  description: Create a production-ready FastAPI service prepared for GitOps, Kubernetes, observability, and Crossplane infrastructure.
  tags:
    - fastapi
    - python
    - golden-path
    - platform-engineering
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service information
      required:
        - name
        - owner
        - description
        - repoUrl
        - domain
        - imageRegistry
      properties:
        name:
          title: Service Name
          type: string
          description: Kubernetes-safe service name, for example team-beta-api
          pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)$'
        owner:
          title: Owner
          type: string
          description: Backstage owner, for example group:default/team-beta
          default: group:default/team-beta
        description:
          title: Description
          type: string
          description: Short description of the service
          default: FastAPI backend generated by the platform golden path
        repoUrl:
          title: Repository Location
          type: string
          # C'est ce champ magique qui va générer l'UI native de sélection de dépôt :
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - iheb-mrabet
        domain:
          title: Base Domain
          type: string
          description: Your nip.io domain, for example 20-123-45-67.nip.io
        imageRegistry:
          title: Image Registry
          type: string
          description: ACR login server, for example ihebplatacr.azurecr.io

  steps:
    - id: fetch-base
      name: Fetch FastAPI skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          domain: ${{ parameters.domain }}
          imageRegistry: ${{ parameters.imageRegistry }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        description: ${{ parameters.description }}
        repoVisibility: public

    - id: register
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}