name: Security First CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  ACR_NAME: ${{ '${{ vars.ACR_NAME }}' }}
  ACR_LOGIN_SERVER: ${{ '${{ vars.ACR_LOGIN_SERVER }}' }}
  IMAGE_NAME: ${{ values.name }}
  IMAGE_TAG: ${{ '${{ github.sha }}' }}

jobs:
  security-build-push:
    name: Scan, Build, Sign, Push, Update GitOps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ '${{ secrets.GITHUB_TOKEN }}' }}

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        env:
          SEMGREP_APP_TOKEN: ${{ '${{ secrets.SEMGREP_APP_TOKEN }}' }}
        continue-on-error: true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          format: table

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ '${{ vars.AZURE_CLIENT_ID }}' }}
          tenant-id: ${{ '${{ vars.AZURE_TENANT_ID }}' }}
          subscription-id: ${{ '${{ vars.AZURE_SUBSCRIPTION_ID }}' }}

      - name: Login to Azure Container Registry
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:dev \
            .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ '${{ env.ACR_LOGIN_SERVER }}' }}/${{ '${{ env.IMAGE_NAME }}' }}:${{ '${{ env.IMAGE_TAG }}' }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          format: table

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG -o spdx-json > sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ '${{ github.sha }}' }}
          path: sbom.spdx.json

      - name: Push Docker image to ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:dev

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign keyless
        run: |
          cosign sign --yes $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          cosign sign --yes $ACR_LOGIN_SERVER/$IMAGE_NAME:dev

      - name: Attest SBOM with Cosign
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ '${{ vars.GITOPS_REPO }}' }}
          token: ${{ '${{ secrets.PLATFORM_GITOPS_TOKEN }}' }}
          path: platform-gitops

      - name: Update image tag in GitOps
        run: |
          cd platform-gitops

          sed -i "s|image: .*${{ values.name }}:.*|image: $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG|g" platform/apps/${{ values.name }}/deployment.yaml

          git config user.name "platform-ci-bot"
          git config user.email "platform-ci-bot@users.noreply.github.com"

          git add platform/apps/${{ values.name }}/deployment.yaml

          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
          else
            git commit -m "Update $IMAGE_NAME image to $IMAGE_TAG"
            git push
          fi